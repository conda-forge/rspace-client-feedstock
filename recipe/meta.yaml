{% set name = "rspace-client" %}
{% set version = "2.6.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/rspace_client-{{ version }}.tar.gz
  sha256: 8b55913e7a2643317b1ce31b4f817ac2503a5a0db3335c6e4367bde4aec82252

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry-core
    - pip
  run:
    - python >={{ python_min }}
    - requests >=2.25.1,<3.0.0
    - beautifulsoup4 >=4.9.3,<5.0.0
    - fs >=2.4.16,<3.0.0

test:
  imports:
    - rspace_client
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/rspace-os/rspace-client-python
  summary: A client for calling RSpace ELN and Inventory APIs
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - bgruening
